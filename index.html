<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Quest 7.0 — 행성 연동 출석체크 통합</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

  <style>
    body {
      font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
      background: linear-gradient(180deg, #F0F4FF 0%, #E8EEFF 100%);
      color: #1E293B;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .minimal-card {
      background: #FFFFFF;
      border: 2px solid #E2E8F0;
      border-radius: 24px;
      box-shadow: 0 8px 16px rgba(108, 140, 255, 0.04);
    }

    /* 70% 중심부 행성 캔버스 뷰포트 */
    .planet-canvas {
      width: 280px;
      height: 280px;
      position: relative;
    }
    
    .planet-sphere {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #6C8CFF;
      border: 6px solid #FFFFFF;
      box-shadow: 0 20px 40px rgba(108, 140, 255, 0.15);
      position: absolute;
      z-index: 10;
      overflow: hidden;
    }

    /* 사용자가 생성한 효과 오브젝트가 누적/성장하는 노드 스타일 */
    .growth-node {
      position: absolute;
      z-index: 12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .orbit-object { position: absolute; z-index: 5; pointer-events: none; }
    
    @keyframes orbitRotate {
      0% { transform: rotate(0deg) translateX(160px) rotate(0deg); }
      100% { transform: rotate(360deg) translateX(160px) rotate(-360deg); }
    }
    .satellite-animation { animation: orbitRotate 25s linear infinite; }

    @keyframes cloudFloat {
      0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.5; }
      50% { transform: translateY(-6px) translateX(8px); opacity: 0.8; }
    }
    .cloud-animation { animation: cloudFloat 7s ease-in-out infinite; }

    /* 커스텀 무선 전송 라디오 버튼 스타일 */
    .custom-radio:checked + label {
      border-color: #6C8CFF;
      background-color: #F0F4FF;
      color: #6C8CFF;
      font-weight: 700;
    }

    /* ─── [신규 추가] 출석체크 전용 애니메이션 및 스타일 레이어 ─── */
    .attendance-star {
      position: absolute;
      z-index: 5;
      animation: pulseStar 2s ease-in-out infinite alternate;
    }
    @keyframes pulseStar {
      0% { transform: scale(0.8); opacity: 0.5; filter: drop-shadow(0 0 2px #FFD166); }
      100% { transform: scale(1.2); opacity: 1; filter: drop-shadow(0 0 8px #FFD166); }
    }

    .attendance-box-node {
      position: absolute;
      z-index: 15;
      animation: bounceBox 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    @keyframes bounceBox {
      0% { transform: translateY(-100px) scale(0.3); opacity: 0; }
      60% { transform: translateY(0) scale(1.1); opacity: 1; }
      80% { transform: scale(0.9); }
      100% { transform: scale(1); }
    }

    .day-slot {
      border: 2px solid #E2E8F0;
      border-radius: 16px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .day-slot.checked {
      background-color: #F0F4FF;
      border-color: #6C8CFF;
    }
    .day-slot.today-active {
      border-color: #FFD166;
      box-shadow: 0 0 0 3px rgba(255, 209, 102, 0.3);
    }
  </style>
</head>
<body class="flex flex-col justify-between items-center p-4 md:p-6 relative select-none">

  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute w-1 h-1 bg-[#A78BFA]/40 rounded-full top-[15%] left-[10%]"></div>
    <div class="absolute w-1 h-1 bg-[#FFD166]/40 rounded-full top-[40%] left-[85%]"></div>
    <div class="absolute w-1.5 h-1.5 bg-[#6C8CFF]/20 rounded-full top-[75%] left-[5%]"></div>
  </div>

  <div id="toast-container" class="z-50"></div>

  <!-- 메인화면 우측 상단 출석체크 버튼 레이아웃 연동 헤더 -->
  <header class="w-full max-w-md flex justify-between items-center py-2 z-10 px-1">
    <h1 class="font-bold text-xl tracking-tight text-slate-800">Habit Quest</h1>
    
    <!-- [기획 명세]: 메인화면 우측 상단 출석체크 진입 단추 -->
    <button onclick="openAttendanceModal(true)" class="flex items-center gap-1.5 bg-white border-2 border-slate-200 hover:border-[#6C8CFF] px-3 py-1.5 rounded-full shadow-2xs transition-all">
      <span class="text-xs">📅</span>
      <span class="text-xs font-bold text-slate-700 tracking-tight">출석체크</span>
      <span id="ui-btn-dot" class="w-2 h-2 bg-rose-500 rounded-full hidden animate-pulse"></span>
    </button>
  </header>

  <main class="w-full max-w-md flex-1 flex flex-col items-center justify-start my-2 z-10 relative pb-24">
    
    <div class="w-full grid grid-cols-3 gap-2.5 mb-4">
      <div class="text-center bg-white border border-slate-200/80 rounded-xl py-1.5">
        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tight">연속 성공</p>
        <p class="text-xs font-bold text-slate-800"><span id="ui-top-streak">12</span>일</p>
      </div>
      <div class="text-center bg-white border border-slate-200/80 rounded-xl py-1.5">
        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tight">골드 자산</p>
        <p class="text-xs font-bold text-[#FFD166]"><span id="ui-top-gold">45</span>G</p>
      </div>
      <div class="text-center bg-white border border-slate-200/80 rounded-xl py-1.5">
        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tight">개척 레벨</p>
        <p class="text-xs font-bold text-[#6C8CFF]">Lv.<span id="ui-top-level">1</span></p>
      </div>
    </div>

    <div class="planet-canvas flex items-center justify-center my-2">
      <!-- [실시간 출석 효과 1]: 출석 완료 시 행성 우주 배경 공간에 영구 생성되는 오로라 성좌 레이어 -->
      <div id="attendance-star-layer" class="absolute inset-0 pointer-events-none"></div>

      <svg class="orbit-object cloud-animation w-10 h-5 text-white/80" style="top: 15%; left: -8%;" viewBox="0 0 24 12" fill="currentColor"><path d="M4 10A3 3 0 0 1 4 4A4 4 0 0 1 12 4A3 3 0 0 1 19 5A3 3 0 0 1 19 10Z"/></svg>
      <div class="orbit-object satellite-animation"><div class="w-3.5 h-3.5 bg-[#FFD166] border-2 border-white rounded-full shadow-xs"></div></div>

      <div id="ui-planet-sphere" class="planet-sphere relative">
        <!-- [실시간 출석 효과 2]: 출석 시 행성 표면에 부드럽게 드롭되는 선물 상자 컨테이너 -->
        <div id="attendance-box-container" class="absolute inset-0 pointer-events-none"></div>

        <div id="effect-forest" class="growth-node w-12 h-12" style="top: 15%; left: 25%; opacity: 0; transform: scale(0);">
          <div class="text-center">
            <span class="text-xl">🌲</span>
            <div id="lvl-forest" class="text-[8px] bg-slate-900/80 text-white font-bold px-1 rounded-sm scale-90">Lv.0</div>
          </div>
        </div>
        <div id="effect-library" class="growth-node w-12 h-12" style="top: 45%; left: 12%; opacity: 0; transform: scale(0);">
          <div class="text-center">
            <span class="text-xl">📚</span>
            <div id="lvl-library" class="text-[8px] bg-slate-900/80 text-white font-bold px-1 rounded-sm scale-90">Lv.0</div>
          </div>
        </div>
        <div id="effect-mountain" class="growth-node w-12 h-12" style="top: 35%; right: 12%; opacity: 0; transform: scale(0);">
          <div class="text-center">
            <span class="text-xl">🏔️</span>
            <div id="lvl-mountain" class="text-[8px] bg-slate-900/80 text-white font-bold px-1 rounded-sm scale-90">Lv.0</div>
          </div>
        </div>
        <div id="effect-star" class="growth-node w-12 h-12" style="top: 65%; left: 45%; opacity: 0; transform: scale(0);">
          <div class="text-center">
            <span class="text-xl">⭐</span>
            <div id="lvl-star" class="text-[8px] bg-slate-900/80 text-white font-bold px-1 rounded-sm scale-90">Lv.0</div>
          </div>
        </div>
        <div id="effect-town" class="growth-node w-12 h-12" style="bottom: 15%; right: 25%; opacity: 0; transform: scale(0);">
          <div class="text-center">
            <span class="text-xl">🏠</span>
            <div id="lvl-town" class="text-[8px] bg-slate-900/80 text-white font-bold px-1 rounded-sm scale-90">Lv.0</div>
          </div>
        </div>
      </div>

      <div class="absolute pointer-events-none" style="z-index: 30; top: 40%; left: 41%; width: 50px; height: 56px;">
        <svg viewBox="0 0 24 24" fill="none" class="w-full h-full filter drop-shadow-md">
          <circle cx="12" cy="11" r="6" fill="#FFFFFF" stroke="#1E293B" stroke-width="2"/>
          <rect x="9" y="9" width="6" height="3" rx="1.5" fill="#6C8CFF"/>
          <path d="M8 17C8 15 10 14 12 14C14 14 16 15 16 17V20H8V17Z" fill="#FFFFFF" stroke="#1E293B" stroke-width="2"/>
        </svg>
      </div>
    </div>

    <!-- 테스트 가속 도구 패널 (출석 날짜 초기화용 개발 보조 키) -->
    <div class="w-full bg-slate-100 p-2.5 rounded-xl border border-slate-200/60 flex justify-between items-center my-2">
      <span class="text-[10px] font-bold text-slate-400">⚙️ 출석 개발용 타임 점프 도구</span>
      <button onclick="simulateNextDay()" class="px-2 py-0.5 bg-slate-700 hover:bg-slate-800 text-white text-[9px] font-bold rounded-md">다음날로 강제 점프</button>
    </div>

    <div class="w-full mt-4 space-y-5">
      <div class="space-y-2">
        <div class="flex justify-between items-center px-1">
          <h3 class="text-xs font-bold text-slate-400 tracking-wider uppercase">오늘의 퀘스트</h3>
          <span class="text-[10px] text-slate-400 font-regular">매일 자동 초기화</span>
        </div>
        <div id="box-today-quests" class="space-y-2.5"></div>
      </div>

      <div class="space-y-2">
        <div class="flex justify-between items-center px-1">
          <h3 class="text-xs font-bold text-slate-400 tracking-wider uppercase">내 퀘스트 (보관 보드)</h3>
          <span class="text-[10px] bg-[#A78BFA]/10 text-[#A78BFA] px-2 py-0.5 rounded-full font-bold">도전 대기 중</span>
        </div>
        <div id="box-my-quests" class="space-y-2.5"></div>
      </div>
    </div>
  </main>

  <div class="fixed bottom-6 right-6 z-40">
    <button onclick="openQuestCreateModal()" class="flex items-center gap-2 bg-[#6C8CFF] hover:bg-[#5b7be6] text-white font-bold px-4 py-3.5 rounded-full shadow-lg transition-all transform hover:scale-105">
      <span class="text-lg leading-none">+</span>
      <span class="text-xs tracking-tight">새 퀘스트</span>
    </button>
  </div>

  <!-- 퀘스트 생성 모달 레이어 (원형 유지) -->
  <div id="modal-quest-create" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs z-50 hidden items-center justify-center p-4">
    <div class="minimal-card w-full max-w-md p-6 max-h-[90vh] overflow-y-auto animate-in fade-in zoom-in-95 duration-150">
      <div class="flex justify-between items-center border-b border-slate-100 pb-3 mb-4">
        <h2 class="text-base font-bold text-slate-800">새 퀘스트 생성</h2>
        <button onclick="closeQuestCreateModal()" class="text-slate-400 hover:text-slate-600 text-sm">✕</button>
      </div>
      <div class="mb-4">
        <p class="text-[11px] font-bold text-slate-400 mb-1.5">✨ 추천 템플릿 요소를 원클릭으로 주입해보세요</p>
        <div class="flex gap-1.5 overflow-x-auto pb-1 text-[11px]">
          <button onclick="injectTemplate('💧 물 2L 마시기', '하루 수분 충전', '건강', 'star')" class="px-2.5 py-1 bg-slate-100 hover:bg-slate-200 rounded-lg whitespace-nowrap text-slate-600">💧 물 2L</button>
          <button onclick="injectTemplate('📚 독서 20분', '지식 축적 및 아티클 정독', '독서', 'library')" class="px-2.5 py-1 bg-slate-100 hover:bg-slate-200 rounded-lg whitespace-nowrap text-slate-600">📚 독서 20분</button>
          <button onclick="injectTemplate('🏃 운동 30분', '기지 맨몸 근력 스트레칭', '운동', 'forest')" class="px-2.5 py-1 bg-slate-100 hover:bg-slate-200 rounded-lg whitespace-nowrap text-slate-600">🏃 운동 30분</button>
          <button onclick="injectTemplate('🛌 7시간 수면', '충분한 생체 리듬 회복', '수면', 'star')" class="px-2.5 py-1 bg-slate-100 hover:bg-slate-200 rounded-lg whitespace-nowrap text-slate-600">🛌 7시간 수면</button>
          <button onclick="injectTemplate('📝 영어 단어 20개', '글로벌 언어 포트폴리오 빌드', '공부', 'town')" class="px-2.5 py-1 bg-slate-100 hover:bg-slate-200 rounded-lg whitespace-nowrap text-slate-600">📝 영단어 20개</button>
        </div>
      </div>
      <div class="space-y-3.5">
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1">퀘스트 이름</label>
          <input id="in-quest-name" type="text" placeholder="예: 영어 단어 30개 외우기" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs outline-none focus:border-[#6C8CFF] font-regular">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1">설명</label>
          <input id="in-quest-desc" type="text" placeholder="예: 해커스 보카 3챕터 암기 및 자체 테스트" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs outline-none focus:border-[#6C8CFF] font-regular">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1.5">카테고리</label>
          <div class="grid grid-cols-3 gap-1.5 text-xs text-center">
            <input type="radio" id="cat-1" name="q-cat" value="운동" checked class="hidden custom-radio"><label for="cat-1" class="border border-slate-200 py-1.5 rounded-lg cursor-pointer text-slate-600 font-regular">운동</label>
            <input type="radio" id="cat-2" name="q-cat" value="공부" class="hidden custom-radio"><label for="cat-2" class="border border-slate-200 py-1.5 rounded-lg cursor-pointer text-slate-600 font-regular">공부</label>
            <input type="radio" id="cat-3" name="q-cat" value="독서" class="hidden custom-radio"><label for="cat-3" class="border border-slate-200 py-1.5 rounded-lg cursor-pointer text-slate-600 font-regular">독서</label>
            <input type="radio" id="cat-4" name="q-cat" value="건강" class="hidden custom-radio"><label for="cat-4" class="border border-slate-200 py-1.5 rounded-lg cursor-pointer text-slate-600 font-regular">건강</label>
            <input type="radio" id="cat-5" name="q-cat" value="수면" class="hidden custom-radio"><label for="cat-5" class="border border-slate-200 py-1.5 rounded-lg cursor-pointer text-slate-600 font-regular">수면</label>
            <input type="radio" id="cat-6" name="q-cat" value="기타" class="hidden custom-radio"><label for="cat-6" class="border border-slate-200 py-1.5 rounded-lg cursor-pointer text-slate-600 font-regular">기타</label>
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1.5">난이도 (보상 배율 결정)</label>
          <div class="grid grid-cols-3 gap-1.5 text-xs text-center">
            <input type="radio" id="diff-1" name="q-diff" value="쉬움" checked class="hidden custom-radio"><label for="diff-1" class="border border-slate-200 py-1.5 rounded-lg cursor-pointer text-slate-600 font-regular">쉬움</label>
            <input type="radio" id="diff-2" name="q-diff" value="보통" class="hidden custom-radio"><label for="diff-2" class="border border-slate-200 py-1.5 rounded-lg cursor-pointer text-slate-600 font-regular">보통</label>
            <input type="radio" id="diff-3" name="q-diff" value="어려움" class="hidden custom-radio"><label for="diff-3" class="border border-slate-200 py-1.5 rounded-lg cursor-pointer text-slate-600 font-regular">어려움</label>
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1.5">반복 주기</label>
          <div class="grid grid-cols-4 gap-1 text-[11px] text-center">
            <input type="radio" id="rep-1" name="q-repeat" value="매일" checked class="hidden custom-radio"><label for="rep-1" class="border border-slate-200 py-1.5 rounded-md cursor-pointer text-slate-600 font-regular">매일</label>
            <input type="radio" id="rep-2" name="q-repeat" value="주 3회" class="hidden custom-radio"><label for="rep-2" class="border border-slate-200 py-1.5 rounded-md cursor-pointer text-slate-600 font-regular">주 3회</label>
            <input type="radio" id="rep-3" name="q-repeat" value="주 5회" class="hidden custom-radio"><label for="rep-3" class="border border-slate-200 py-1.5 rounded-md cursor-pointer text-slate-600 font-regular">주 5회</label>
            <input type="radio" id="rep-4" name="q-repeat" value="사용자 지정" class="hidden custom-radio"><label for="rep-4" class="border border-slate-200 py-1.5 rounded-md cursor-pointer text-slate-600 font-regular">커스텀</label>
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1.5">행성 매핑 효과 (완료 시 레벨업)</label>
          <div class="grid grid-cols-3 gap-1.5 text-xs text-center">
            <input type="radio" id="eff-1" name="q-eff" value="forest" checked class="hidden custom-radio"><label for="eff-1" class="border border-slate-200 py-1.5 rounded-lg cursor-pointer text-slate-600 font-regular">🌲 숲 성장</label>
            <input type="radio" id="eff-2" name="q-eff" value="library" class="hidden custom-radio"><label for="eff-2" class="border border-slate-200 py-1.5 rounded-lg cursor-pointer text-slate-600 font-regular">📚 도서관 생성</label>
            <input type="radio" id="eff-3" name="q-eff" value="mountain" class="hidden custom-radio"><label for="eff-3" class="border border-slate-200 py-1.5 rounded-lg cursor-pointer text-slate-600 font-regular">🏔️ 산 생성</label>
            <input type="radio" id="eff-4" name="q-eff" value="star" class="hidden custom-radio"><label for="eff-4" class="border border-slate-200 py-1.5 rounded-lg cursor-pointer text-slate-600 font-regular">⭐ 별빛 증가</label>
            <input type="radio" id="eff-5" name="q-eff" value="town" class="hidden custom-radio"><label for="eff-5" class="border border-slate-200 py-1.5 rounded-lg cursor-pointer text-slate-600 font-regular">🏠 마을 성장</label>
          </div>
        </div>
        <div class="bg-slate-50 border border-slate-200 p-3 rounded-xl flex justify-between items-center text-xs">
          <span class="font-bold text-slate-500">예상 획득 보상</span>
          <div class="flex gap-3 font-bold">
            <span class="text-[#6C8CFF]">EXP +50</span>
            <span class="text-[#FFD166]">Coin +20</span>
          </div>
        </div>
      </div>
      <div class="flex gap-2.5 mt-5">
        <button onclick="closeQuestCreateModal()" class="flex-1 border border-slate-200 hover:bg-slate-50 py-2.5 rounded-xl text-xs font-bold text-slate-500">취소</button>
        <button onclick="submitNewCustomQuest()" class="flex-1 bg-[#6C8CFF] hover:bg-[#5b7be6] text-white py-2.5 rounded-xl text-xs font-bold shadow-xs">생성</button>
      </div>
    </div>
  </div>

  <!-- ─── [신규 추가] 기획서 충족형 7일 주간 출석체크 모달 구성 바 ─── -->
  <div id="modal-attendance" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs z-50 hidden items-center justify-center p-4">
    <!-- 배경 터치 시 레이어 이탈 바인딩 핸들러 -->
    <div class="absolute inset-0" onclick="handleOutsideClick(event)"></div>
    
    <div class="minimal-card w-full max-w-sm p-5 relative z-10 animate-in fade-in zoom-in-95 duration-150">
      <!-- [명세 요건]: 확실히 각인된 우측 상단 [✕] 버튼 탑재 -->
      <button onclick="closeAttendanceModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full hover:bg-slate-100 transition-all">✕</button>

      <div class="text-center mb-4">
        <h2 class="text-base font-bold text-slate-800">📅 출석체크 보드</h2>
        <p class="text-xs text-slate-400 mt-0.5">7일 누적 보상을 받고 월드 행성을 꾸며보세요!</p>
      </div>

      <!-- 7일 출석 배치 보드 그리드 (상단 DAY 1~4 / 하단 DAY 5~7 완벽 구현) -->
      <div class="space-y-2.5">
        <div class="grid grid-cols-4 gap-2 text-center" id="board-row-top"></div>
        <div class="grid grid-cols-3 gap-2 text-center" id="board-row-bottom"></div>
      </div>

      <!-- 정산 트리거 조작부 버튼 인터페이스 -->
      <div class="mt-5" id="attendance-action-area"></div>

      <!-- [명세 요건]: 하단 전용 '오늘 하루 이 창을 보지 않기' 바인딩 바 -->
      <div class="mt-4 pt-3 border-t border-slate-100 flex justify-between items-center text-[11px] text-slate-400">
        <label class="flex items-center gap-1.5 cursor-pointer select-none">
          <input type="checkbox" id="chk-hide-today" class="rounded border-slate-300 text-[#6C8CFF] focus:ring-[#6C8CFF] w-3.5 h-3.5" onclick="toggleHideTodayOption(this)">
          <span>오늘 하루 이 창을 보지 않기</span>
        </label>
        <span class="font-medium text-slate-300">Habit Quest</span>
      </div>
    </div>
  </div>

  <script>
    // 기존 스토리지 키와의 충돌 및 정렬을 위한 개별 통합 네임스페이스
    const STORAGE_KEY_V6 = "HABIT_QUEST_V6_CORE";

    // 7일 순환형 보상 마스터 딕셔너리 데이터맵
    const REWARD_META = {
      1: { name: "100 Coin", icon: "🪙", type: "coin", value: 100 },
      2: { name: "200 Coin", icon: "🪙", type: "coin", value: 200 },
      3: { name: "경험치 부스트", icon: "⚡", type: "buff", value: 50 },
      4: { name: "장식 아이템", icon: "🍄", type: "decor", value: "mushroom" },
      5: { name: "랜덤 상자", icon: "📦", type: "box", value: "random_box" },
      6: { name: "희귀 가구", icon: "🪑", type: "furniture", value: "rare_chair" },
      7: { name: "전설 장식", icon: "👑", type: "legend", value: "crown_monument" }
    };

    // 로컬 데이터 구조 초기 로드 및 출석 연동 확장 바인딩 스키마 구축
    let state = JSON.parse(localStorage.getItem(STORAGE_KEY_V6)) || {
      streak: 12, coin: 45, level: 1,
      planetInfrastructure: { forest: 1, library: 0, mountain: 0, star: 2, town: 0 },
      todayQuests: [
        { id: 101, title: "운동 30분 기지 러닝", desc: "주변 궤도 가벼운 산책", cat: "운동", diff: "보통", repeat: "매일", effect: "forest", progress: 60, done: false },
        { id: 102, title: "독서 20분 전문 서적 탐독", desc: "지식 데이터 축적", cat: "독서", diff: "쉬움", repeat: "매일", effect: "library", progress: 100, done: true }
      ],
      myQuests: [
        { id: 1, title: "영어 단어 30개 외우기", desc: "해커스 핵심 어휘 암기", cat: "공부", diff: "보통", repeat: "주 3회", effect: "town", progress: 0, done: false },
        { id: 2, title: "포트폴리오 UI 디자인 작업", desc: "미니멀 서페이스 가이드라인 빌드", cat: "공부", diff: "어려움", repeat: "사용자 지정", effect: "library", progress: 30, done: false }
      ]
    };

    // 출석 서브엔진 메모리 초기화 분기 병합 (기존 state에 출석 키가 없으면 동적 주입)
    if (!state.hasOwnProperty('attendance')) {
      state.attendance = {
        currentDayIndex: 1,
        checkedDays: [],
        lastCheckedDateStr: null,
        hideUntilTimestamp: 0
      };
    }

    window.onload = function() {
      renderCoreSystemLayout();
      renderStarConstellations();
      renderPlanetBoxNode();
      
      // [첫 로그인 시 자동 표시 로직 실행]
      const now = Date.now();
      const isAlreadyCheckedToday = checkIsToday(state.attendance.lastCheckedDateStr);
      
      if (!isAlreadyCheckedToday && now > state.attendance.hideUntilTimestamp) {
        setTimeout(() => openAttendanceModal(false), 500);
      } else if (!isAlreadyCheckedToday) {
        // 하루 안보기 처리 상태에서 미출석인 경우 우측 상단 단추에 알림 표시 점등
        document.getElementById('ui-btn-dot').classList.remove('hidden');
      }
    };

    /* ─── 출석체크 컴포넌트 핸들링 코어 펑션 그룹 ─── */
    function openAttendanceModal(isManualClick) {
      document.getElementById('modal-attendance').style.display = 'flex';
      buildAttendanceBoardGrid();
    }

    function closeAttendanceModal() {
      document.getElementById('modal-attendance').style.display = 'none';
    }

    function handleOutsideClick(e) {
      closeAttendanceModal();
    }

    // ESC 닫기 명세 기능 바인딩
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeAttendanceModal();
    });

    function toggleHideTodayOption(checkbox) {
      if (checkbox.checked) {
        const expiration = new Date();
        expiration.setHours(23, 59, 59, 999);
        state.attendance.hideUntilTimestamp = expiration.getTime();
        showToast("🌙 오늘 자정 전까지 출석 보드가 자동으로 열리지 않습니다.");
      } else {
        state.attendance.hideUntilTimestamp = 0;
      }
      saveToStorage();
    }

    function buildAttendanceBoardGrid() {
      const topRow = document.getElementById('board-row-top');
      const bottomRow = document.getElementById('board-row-bottom');
      const actionArea = document.getElementById('attendance-action-area');
      
      topRow.innerHTML = '';
      bottomRow.innerHTML = '';

      const isTodayChecked = checkIsToday(state.attendance.lastCheckedDateStr);

      for (let d = 1; d <= 7; d++) {
        const reward = REWARD_META[d];
        const isChecked = state.attendance.checkedDays.includes(d);
        const isCurrentTarget = (d === state.attendance.currentDayIndex) && !isTodayChecked;

        const slot = document.createElement('div');
        slot.className = `day-slot p-2 flex flex-col items-center justify-between min-h-[82px] bg-white relative`;
        
        if (isChecked) slot.classList.add('checked');
        if (isCurrentTarget) slot.classList.add('today-active');

        // ✓ 체크 표시 구상 바인딩
        slot.innerHTML = `
          <div class="text-[9px] font-bold ${isChecked ? 'text-[#6C8CFF]' : isCurrentTarget ? 'text-[#FFD166]' : 'text-slate-400'} uppercase">DAY ${d}</div>
          <div class="text-xl my-1">${reward.icon}</div>
          <div class="text-[10px] font-bold text-slate-700 tracking-tighter">${reward.name}</div>
          ${isChecked ? `<div class="absolute inset-0 bg-[#6C8CFF]/10 rounded-xl flex items-center justify-center text-sm font-bold text-[#6C8CFF]">✓</div>` : ''}
        `;

        if (d <= 4) topRow.appendChild(slot);
        else bottomRow.appendChild(slot);
      }

      if (isTodayChecked) {
        actionArea.innerHTML = `<div class="w-full bg-slate-100 text-slate-400 py-3 rounded-xl text-xs font-bold text-center">🎉 오늘의 출석 보상을 수령했습니다.</div>`;
      } else {
        actionArea.innerHTML = `
          <button onclick="executeTodayCheckIn()" class="w-full bg-[#6C8CFF] hover:bg-[#5b7be6] text-white py-3 rounded-xl text-xs font-bold shadow-md transition-all transform active:scale-98">
            DAY ${state.attendance.currentDayIndex} 출석 보상 받기
          </button>
        `;
      }
    }

    function executeTodayCheckIn() {
      const isTodayChecked = checkIsToday(state.attendance.lastCheckedDateStr);
      if (isTodayChecked) return;

      const currentDay = state.attendance.currentDayIndex;
      const reward = REWARD_META[currentDay];

      state.attendance.checkedDays.push(currentDay);
      state.attendance.lastCheckedDateStr = getTodayDateString();

      // 코인 획득 시 잔액 스탯 증가 연동
      if (reward.type === 'coin') {
        state.coin += reward.value;
      }

      showToast(`✨ DAY ${currentDay} 출석 성공: [${reward.name}] 지급!`);
      document.getElementById('ui-btn-dot').classList.add('hidden');

      // 💥 행성 연동 시각 연출 트리거 구동 가동
      triggerPlanetVisualSyncEffect(currentDay);

      if (state.attendance.currentDayIndex < 7) {
        state.attendance.currentDayIndex += 1;
      } else {
        state.attendance.currentDayIndex = 1;
        state.attendance.checkedDays = [];
        showToast("🪐 7일 출석 보드가 안전하게 다음 순환 주차로 리셋되었습니다.");
      }

      saveToStorage();
      renderCoreSystemLayout();
      closeAttendanceModal();
    }

    // [핵심 인지 연출기]: 출석 여부에 따른 행성의 실시간 변화 레이어 렌더러
    function triggerPlanetVisualSyncEffect(dayNum) {
      renderSingleStarNode(dayNum);
      renderPlanetBoxNode();
    }

    function renderStarConstellations() {
      const container = document.getElementById('attendance-star-layer');
      container.innerHTML = '';
      state.attendance.checkedDays.forEach(day => {
        renderSingleStarNode(day);
      });
    }

    function renderSingleStarNode(dayNum) {
      const container = document.getElementById('attendance-star-layer');
      const coordMatrix = [
        { x: 5, y: 15 }, { x: 88, y: 20 }, { x: 12, y: 80 },
        { x: 82, y: 75 }, { x: 50, y: -8 }, { x: -6, y: 50 }, { x: 94, y: 48 }
      ];
      const pos = coordMatrix[(dayNum - 1) % coordMatrix.length];

      const starNode = document.createElement('div');
      starNode.className = 'attendance-star text-sm select-none';
      starNode.innerText = '✨';
      starNode.style.left = pos.x + '%';
      starNode.style.top = pos.y + '%';
      container.appendChild(starNode);
    }

    function renderPlanetBoxNode() {
      const container = document.getElementById('attendance-box-container');
      container.innerHTML = '';

      if (checkIsToday(state.attendance.lastCheckedDateStr)) {
        const boxNode = document.createElement('div');
        boxNode.className = 'attendance-box-node text-xl select-none';
        boxNode.innerText = '🎁';
        boxNode.style.bottom = '18%';
        boxNode.style.left = '42%';
        boxNode.style.cursor = 'pointer';
        boxNode.onclick = (e) => {
          e.stopPropagation();
          showToast("🎁 행성에 배치된 출석 보상 상자입니다! 내일 출석 시 새 상자가 드롭됩니다.");
        };
        container.appendChild(boxNode);
      }
    }

    // 개발용 강제 날짜 워프 시뮬레이터
    function simulateNextDay() {
      state.attendance.lastCheckedDateStr = "2000-01-01";
      state.attendance.hideUntilTimestamp = 0;
      saveToStorage();
      
      document.getElementById('ui-btn-dot').classList.remove('hidden');
      document.getElementById('chk-hide-today').checked = false;
      
      showToast("⚙️ 개발자 도구: 다음날 새벽으로 타임워프했습니다. 출석이 활성화됩니다.");
      buildAttendanceBoardGrid();
      renderPlanetBoxNode();
    }

    function getTodayDateString() {
      const d = new Date();
      return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    }
    function checkIsToday(dateStr) {
      return dateStr === getTodayDateString();
    }

    /* ─── 기존 Habit Quest 6.0 순정 기능 그룹 (원형 보존) ─── */
    function openQuestCreateModal() {
      document.getElementById('modal-quest-create').style.display = 'flex';
    }
    function closeQuestCreateModal() {
      document.getElementById('modal-quest-create').style.display = 'none';
      clearInputForm();
    }
    function clearInputForm() {
      document.getElementById('in-quest-name').value = '';
      document.getElementById('in-quest-desc').value = '';
    }

    function injectTemplate(name, desc, catValue, effectValue) {
      document.getElementById('in-quest-name').value = name;
      document.getElementById('in-quest-desc').value = desc;
      document.querySelectorAll(`input[name="q-cat"]`).forEach(el => { if(el.value === catValue) el.checked = true; });
      document.querySelectorAll(`input[name="q-eff"]`).forEach(el => { if(el.value === effectValue) el.checked = true; });
      showToast("✨ 템플릿 명세가 양식에 주입되었습니다.");
    }

    function submitNewCustomQuest() {
      const nameInput = document.getElementById('in-quest-name').value.trim();
      const descInput = document.getElementById('in-quest-desc').value.trim() || "추가 상세 설명 없음";
      
      if (!nameInput) {
        alert("퀘스트 이름을 반드시 기입해 주세요.");
        return;
      }

      const selectedCat = document.querySelector('input[name="q-cat"]:checked').value;
      const selectedDiff = document.querySelector('input[name="q-diff"]:checked').value;
      const selectedRepeat = document.querySelector('input[name="q-repeat"]:checked').value;
      const selectedEff = document.querySelector('input[name="q-eff"]:checked').value;

      const newQuestObject = {
        id: Date.now(),
        title: nameInput,
        desc: descInput,
        cat: selectedCat,
        diff: selectedDiff,
        repeat: selectedRepeat,
        effect: selectedEff,
        progress: 0,
        done: false
      };

      state.myQuests.unshift(newQuestObject);
      
      saveToStorage();
      closeQuestCreateModal();
      renderCoreSystemLayout();
      showToast("📥 새 커스텀 미션이 [내 퀘스트] 리스트로 보관 입고되었습니다.");
    }

    function renderCoreSystemLayout() {
      document.getElementById('ui-top-streak').innerText = state.streak;
      document.getElementById('ui-top-gold').innerText = state.coin;
      document.getElementById('ui-top-level').innerText = state.level;

      Object.keys(state.planetInfrastructure).forEach(key => {
        const lvl = state.planetInfrastructure[key];
        const node = document.getElementById(`effect-${key}`);
        const label = document.getElementById(`lvl-${key}`);
        
        if(label) label.innerText = `Lv.${lvl}`;
        if(node) {
          if (lvl > 0) {
            node.style.opacity = "1";
            node.style.transform = "scale(1)";
          } else {
            node.style.opacity = "0";
            node.style.transform = "scale(0)";
          }
        }
      });

      const todayBox = document.getElementById('box-today-quests');
      todayBox.innerHTML = '';
      if(state.todayQuests.length === 0) {
        todayBox.innerHTML = `<div class="text-center py-4 text-xs text-slate-400 font-regular bg-white rounded-xl border border-dashed">오늘 부여된 정규 과제가 없습니다.</div>`;
      }
      state.todayQuests.forEach(q => { todayBox.appendChild(buildQuestCardComponent(q, true)); });

      const myBox = document.getElementById('box-my-quests');
      myBox.innerHTML = '';
      if(state.myQuests.length === 0) {
        myBox.innerHTML = `<div class="text-center py-4 text-xs text-slate-400 font-regular bg-white rounded-xl border border-dashed">내 퀘스트 보관함이 비어있습니다. FAB 버튼으로 생성하세요.</div>`;
      }
      state.myQuests.forEach(q => { myBox.appendChild(buildQuestCardComponent(q, false)); });
    }

    function buildQuestCardComponent(q, isTodayScope) {
      const card = document.createElement('div');
      
      if (q.done) {
        card.className = "p-4 rounded-xl border border-emerald-200 bg-emerald-50/60 transition-all";
        card.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              <div class="flex items-center gap-2">
                <span class="text-sm font-bold text-emerald-700">✔ ${q.title}</span>
                <span class="text-[9px] bg-emerald-100 text-emerald-600 px-1.5 py-0.5 rounded-sm font-bold">완료됨</span>
              </div>
              <p class="text-[11px] text-slate-400 mt-0.5 font-regular">${q.desc}</p>
            </div>
          </div>
          <div class="flex gap-3 mt-3 text-[10px] font-bold text-emerald-600 border-t border-emerald-100 pt-2">
            <span>✨ +50 EXP 획득완료</span>
            <span>🪙 +20 Coin 획득완료</span>
          </div>
        `;
      } else {
        card.className = "p-4 rounded-xl border border-slate-200 bg-white shadow-2xs hover:border-slate-300 transition-all";
        
        let catEmoji = "📝";
        if(q.cat === '운동') catEmoji = "🏃";
        if(q.cat === '공부') catEmoji = "📚";
        if(q.cat === '독서') catEmoji = "📖";
        if(q.cat === '건강') catEmoji = "💧";
        if(q.cat === '수면') catEmoji = "🛌";

        card.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              <div class="flex items-center gap-2">
                <span class="text-xs font-bold text-slate-800">${catEmoji} ${q.title}</span>
                <span class="text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-sm font-bold">진행중</span>
              </div>
              <p class="text-[11px] text-slate-400 mt-0.5 font-regular">${q.desc}</p>
            </div>
            <button onclick="triggerQuestCompleteEngine(${q.id}, ${isTodayScope})" class="px-2.5 py-1 bg-[#6C8CFF] text-white text-[11px] font-bold rounded-lg hover:bg-[#5b7be6]">완료</button>
          </div>

          <div class="mt-3 space-y-1">
            <div class="flex justify-between text-[10px] text-slate-400 font-bold">
              <span>진행률</span>
              <span>${q.progress}%</span>
            </div>
            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
              <div class="bg-[#6C8CFF] h-full rounded-full" style="width: ${q.progress}%"></div>
            </div>
          </div>

          <div class="flex justify-between items-center mt-3 border-t border-slate-100 pt-2 text-[10px]">
            <div class="flex gap-2 font-bold text-slate-400">
              <span>EXP +50</span>
              <span>Coin +20</span>
            </div>
            <span class="text-[9px] font-bold text-[#A78BFA]">✨ 효과: ${q.effect === 'forest'?'숲 성장':q.effect==='library'?'도서관 생성':q.effect==='mountain'?'산 생성':q.effect==='star'?'별빛 증가':'마을 성장'}</span>
          </div>
        `;
      }
      return card;
    }

    function triggerQuestCompleteEngine(targetId, isTodayScope) {
      let targetList = isTodayScope ? state.todayQuests : state.myQuests;
      const match = targetList.find(x => x.id === targetId);
      
      if(!match || match.done) return;

      match.done = true;
      match.progress = 100;
      state.coin += 20;

      const effectKey = match.effect;
      if (state.planetInfrastructure[effectKey] !== undefined) {
        state.planetInfrastructure[effectKey] += 1;
        const currentLevel = state.planetInfrastructure[effectKey];
        
        let effectMsg = "";
        if(effectKey === 'forest') effectMsg = `🌲 행성의 숲이 울창해졌습니다! (현재 Lv.${currentLevel})`;
        if(effectKey === 'library') effectMsg = `📚 지식의 도서관 건물이 증축되었습니다! (현재 Lv.${currentLevel})`;
        if(effectKey === 'mountain') effectMsg = `🏔️ 기지에 새로운 거대 산맥이 솟아났습니다! (현재 Lv.${currentLevel})`;
        if(effectKey === 'star') effectMsg = `⭐ 행성 밤하늘의 오로라 별빛 강도가 세졌습니다! (현재 Lv.${currentLevel})`;
        if(effectKey === 'town') effectMsg = `🏠 문명 개척지 마을이 확장되었습니다! (현재 Lv.${currentLevel})`;
        
        showToast(`🌌 행성 효과 반영: ${effectMsg}`);
      } else {
        showToast("🎯 퀘스트 완료 보상이 안전하게 정산되었습니다. +20G");
      }

      saveToStorage();
      renderCoreSystemLayout();
    }

    function saveToStorage() {
      localStorage.setItem(STORAGE_KEY_V6, JSON.stringify(state));
    }

    function showToast(text) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'fixed top-6 left-1/2 transform -translate-x-1/2 bg-slate-900/90 text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow-lg z-50 text-center pointer-events-none transition-all';
      toast.innerText = text;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 2800);
    }
  </script>
</body>
